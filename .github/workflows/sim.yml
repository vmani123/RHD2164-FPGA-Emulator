name: sim

# Run the self-checking RHD2164 testbench on every push and pull request.
on:
  push:
  pull_request:

jobs:
  iverilog:
    name: Icarus Verilog simulation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Run testbench (reference model + functional coverage)
        run: ./sim/run_sim.sh
